<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grokimus</title>
    
    <!-- Favicon -->
    <link rel="icon" href="favicon.png" type="image/png">
    <link rel="apple-touch-icon" href="favicon.png">
    <link rel="shortcut icon" href="favicon.png">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.68), rgba(0,0,0,0.82)), 
                        url('Grokimus.jpg') center/cover no-repeat fixed;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .content {
            text-align: center;
            z-index: 2;
            padding: 0 20px;
        }

        .logo {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 5.4rem;
            font-weight: 700;
            letter-spacing: -4.5px;
            margin-bottom: 12px;
            background: linear-gradient(90deg, #ffffff, #ef4444); /* Tesla Red Gradient */
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tagline {
            font-size: 1.42rem;
            font-weight: 400;
            opacity: 0.88;
            letter-spacing: 9px;
            margin-bottom: 100px;
            color: #fca5a5;                    /* Soft Tesla red tint */
        }

        .coming-soon {
            font-size: 1.0rem;
            letter-spacing: 6px;
            opacity: 0.55;
            font-weight: 500;
        }

        .glow {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 240px;
            background: radial-gradient(circle at center, rgba(239, 68, 68, 0.18), transparent 70%);
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="glow"></div>
    
    <div class="content">
        <h1 class="logo">GROKIMUS</h1>
        <p class="tagline">DIGITAL OPTIMUS</p>
        <p class="coming-soon">ARRIVING SOON</p>
    </div>
</body>
</html>
