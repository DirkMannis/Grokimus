<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grokimus</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.78)), 
                        url('Grokimus.jpg') center/cover no-repeat fixed;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .content {
            text-align: center;
            z-index: 2;
            padding: 0 20px;
        }

        .logo {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 5.4rem;
            font-weight: 700;
            letter-spacing: -4.5px;
            margin-bottom: 12px;
            background: linear-gradient(90deg, #ffffff, #67e8f9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tagline {
            font-size: 1.48rem;
            font-weight: 400;
            opacity: 0.9;
            letter-spacing: 8px;
            margin-bottom: 90px;
            color: #a5f3fc;
        }

        .coming-soon {
            font-size: 1.05rem;
            letter-spacing: 5px;
            opacity: 0.65;
            font-weight: 500;
        }

        .glow {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 240px;
            background: radial-gradient(circle at center, rgba(103, 232, 249, 0.20), transparent 70%);
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="glow"></div>
    
    <div class="content">
        <h1 class="logo">GROKIMUS</h1>
        <p class="tagline">DIGITAL OPTIMUS</p>
        <p class="coming-soon">ARRIVING SOON</p>
    </div>
</body>
</html>
