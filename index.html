<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grokimus</title>
    <meta name="description" content="Digital Optimus Infrastructure">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.68), rgba(0,0,0,0.82)), 
                        url('Grokimus.jpg') center/cover no-repeat fixed;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .content {
            text-align: center;
            z-index: 2;
            padding: 0 20px;
        }

        .logo {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 5.4rem;
            font-weight: 700;
            letter-spacing: -4.5px;
            margin-bottom: 12px;
            background: linear-gradient(90deg, #ffffff, #ef4444); /* Tesla red gradient */
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tagline {
            font-size: 1.42rem;
            font-weight: 400;
            opacity: 0.85;
            letter-spacing: 9px;
            margin-bottom: 100px;
            color: #fca5a5;
        }

        .coming-soon {
            font-size: 1.0rem;
            letter-spacing: 6px;
            opacity: 0.55;
            font-weight: 500;
        }

        .footer {
            position: absolute;
            bottom: 32px;
            font-size: 0.78rem;
            opacity: 0.4;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div class="content">
        <h1 class="logo">GROKIMUS</h1>
        <p class="tagline">DIGITAL OPTIMUS</p>
        <p class="coming-soon">ARRIVING SOON</p>
    </div>

    <div class="footer">
        © 2026 GROKIMUS
    </div>
</body>
</html>
